name: Validate Catalog PR

on:
  pull_request:
    paths:
      - 'public/catalog/**'
      - 'src/catalog/schemas.ts'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate catalog entries
        id: validate
        run: |
          npx tsx scripts/validate-catalog.ts --json > validation-result.json 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Check result
        id: check
        run: |
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('validation-result.json', 'utf8'));
            console.log('Valid:', r.valid);
            console.log('Errors:', r.errors?.length ?? 0);
            console.log('Warnings:', r.warnings?.length ?? 0);
            console.log('Devices:', r.deviceCount);
            console.log('Connectors:', r.connectorCount);
            if (!r.valid) process.exit(1);
          "

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('validation-result.json', 'utf8'));
            } catch {
              result = {
                valid: false,
                errors: [{ slug: '', field: '', message: 'Validation script failed to produce output' }],
                warnings: [],
                deviceCount: 0,
                connectorCount: 0,
              };
            }

            let body = '## Catalog Validation Results\n\n';
            body += `**Devices:** ${result.deviceCount ?? '?'} | **Connectors:** ${result.connectorCount ?? '?'}\n\n`;

            if (result.valid) {
              body += '**Status:** All checks passed\n\n';
            } else {
              body += '**Status:** Validation failed\n\n';
            }

            if (result.errors?.length) {
              body += '### Errors (must fix)\n\n';
              body += '| Slug | Field | Message |\n|------|-------|---------|\n';
              for (const e of result.errors) {
                body += `| ${e.slug || '-'} | ${e.field || '-'} | ${e.message} |\n`;
              }
              body += '\n';
            }

            if (result.warnings?.length) {
              body += '### Warnings (review recommended)\n\n';
              body += '| Slug | Field | Value | Message |\n|------|-------|-------|---------|\n';
              for (const w of result.warnings) {
                body += `| ${w.slug} | ${w.field} | ${w.value} | ${w.message} |\n`;
              }
              body += '\n';
            }

            if (!result.errors?.length && !result.warnings?.length) {
              body += 'No issues found.\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
